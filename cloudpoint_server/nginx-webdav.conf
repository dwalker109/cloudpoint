worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 0;

    server {
        listen 80;
        server_name _;

        root /data/webdav;

        client_body_temp_path /data/webdav_tmp;

        location / {

            content_by_lua_block {
                local method = ngx.req.get_method()
                local fspath = ngx.var.document_root .. ngx.var.uri

                if method == "PUT" then
                    -- Reject if file already exists
                    local f = io.open(fspath, "r")
                    if f then
                        f:close()
                        ngx.exit(ngx.HTTP_FORBIDDEN)
                    end
                    -- Create parent dirs
                    local dir = fspath:match("^(.*)/[^/]+$")
                    if dir then
                        os.execute("mkdir -p " .. dir)
                    end
                    -- Write body to file
                    ngx.req.read_body()
                    local body = ngx.req.get_body_data()
                    if not body then
                        local tmp = ngx.req.get_body_file()
                        if tmp then
                            local tf = io.open(tmp, "rb")
                            body = tf:read("*a")
                            tf:close()
                        end
                    end
                    local out = io.open(fspath, "wb")
                    if not out then
                        ngx.exit(500)
                        return
                    end
                    out:write(body or "")
                    out:close()
                    ngx.status = 201
                    return
                end

                if method ~= "GET" and method ~= "HEAD" then
                    ngx.exit(ngx.HTTP_NOT_ALLOWED)
                end

                local fspath = ngx.var.document_root .. ngx.var.uri

                -- Check if path is a file (not a directory)
                local is_dir = os.execute("test -d " .. fspath .. " 2>/dev/null")
                if not is_dir then
                    -- Serve file directly
                    local f = io.open(fspath, "rb")
                    if not f then
                        ngx.exit(404)
                        return
                    end
                    local data = f:read("*a")
                    f:close()
                    ngx.header["Content-Type"] = "application/octet-stream"
                    ngx.print(data)
                    return
                end

                -- It's a directory listing
                local limit = 10
                local entries = {}

                local handle = io.popen("ls -1 " .. fspath .. " 2>/dev/null")
                if not handle then
                    ngx.status = 404
                    ngx.say("[]")
                    return
                end

                for name in handle:lines() do
                    local fullpath = fspath .. "/" .. name
                    local attr_handle = io.popen("stat -c '%Y %s %F' " .. fullpath .. " 2>/dev/null")
                    if attr_handle then
                        local stat = attr_handle:read("*l")
                        attr_handle:close()
                        if stat then
                            local mtime, size, ftype = stat:match("^(%d+) (%d+) (.+)$")
                            table.insert(entries, {
                                name = name,
                                mtime = tonumber(mtime),  -- already unix ts
                                size = tonumber(size),
                                type = ftype == "directory" and "directory" or "file"
                            })
                        end
                    end
                end
                handle:close()

                -- Sort by mtime descending
                table.sort(entries, function(a, b) return a.mtime > b.mtime end)

                -- Limit
                local result = {}
                for i = 1, math.min(limit, #entries) do
                    result[i] = entries[i]
                end

                local cjson = require "cjson"
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode(result))
            }

            limit_except GET HEAD PUT {
                deny all;
            }
        }
    }
}
