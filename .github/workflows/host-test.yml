name: Host Tests

on:
  push:

jobs:
  host-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH client
        shell: bash
        run: apt-get update && apt-get install -y openssh-client

      - name: Set up SSH for private deps
        if: ${{ inputs.ssh-private-key != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ inputs.ssh-private-key }}

      - name: Configure git to use SSH for GitHub
        if: ${{ inputs.ssh-private-key != '' }}
        shell: bash
        run: git config --global url."git@github.com:".insteadOf "https://github.com/"

      - name: Setup Rust (nightly)
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly --profile minimal --component rust-src
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH

      - name: Install zlib and deps for host tests
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev pkg-config libssl-dev

      - name: Run host tests
        run: cargo test --workspace
        shell: bash
