# .github/workflows/build.yml
name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    env:
      HOME: /root

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- \
            -y --default-toolchain nightly --profile minimal
          echo "/root/.cargo/bin" >> $GITHUB_PATH

      - name: Install cargo-3ds
        run: cargo install cargo-3ds --locked

      - name: Build
        run: cargo 3ds build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudpoint
          path: target/armv6k-nintendo-3ds/release/cloudpoint.3dsx
          
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudpoint

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: cloudpoint.3dsx
          generate_release_notes: true
