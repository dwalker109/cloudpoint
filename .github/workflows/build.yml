# .github/workflows/build.yml
name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo-3ds
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-3ds
          key: cargo-3ds-${{ runner.os }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: armv6k-nintendo-3ds

      - name: Install cargo-3ds
        run: cargo install cargo-3ds --locked 2>/dev/null || true

      - name: Build
        run: cargo 3ds build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudpoint
          path: target/armv6k-nintendo-3ds/release/cloudpoint.3dsx

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudpoint

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: cloudpoint.3dsx
          generate_release_notes: true
